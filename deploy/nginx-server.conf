# ==========================================
# Zplus POS - Nginx Config for Host Nginx
# ==========================================
# Deploy to: /etc/nginx/sites-available/zplus.vipos.vn
# Symlink:   ln -s /etc/nginx/sites-available/zplus.vipos.vn /etc/nginx/sites-enabled/
# ==========================================

upstream zplus_backend {
    server 127.0.0.1:8088;
}

upstream zplus_frontend {
    server 127.0.0.1:3088;
}

# Rate limiting
limit_req_zone $binary_remote_addr zone=zplus_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=zplus_login:10m rate=5r/m;

server {
    listen 80;
    server_name zplus.vipos.vn;

    # Redirect to HTTPS (will be auto-updated by Certbot)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name zplus.vipos.vn;

    # SSL certificates (will be managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/zplus.vipos.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zplus.vipos.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Upload size
    client_max_body_size 50M;

    # ==========================================
    # Backend API
    # ==========================================
    location /api/ {
        limit_req zone=zplus_api burst=20 nodelay;

        proxy_pass http://zplus_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check (backend)
    location /health {
        proxy_pass http://zplus_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Login rate limiting
    location /api/v1/auth/login {
        limit_req zone=zplus_login burst=3 nodelay;

        proxy_pass http://zplus_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================
    # WebSocket
    # ==========================================
    location /ws {
        proxy_pass http://zplus_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ==========================================
    # Frontend (Next.js)
    # ==========================================
    location / {
        proxy_pass http://zplus_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Static assets caching
    location /_next/static {
        proxy_pass http://zplus_frontend;
        proxy_cache_valid 60m;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
