services:
  registry:
    image: registry:2
    container_name: zplus-registry
    ports:
      - "5000:5000"
    volumes:
      - registry_data:/var/lib/registry
    restart: unless-stopped
    networks:
      - zplus-network

  mongodb:
    image: mongo:7
    container_name: zplus-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-zplus_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-zplus_pos}
    volumes:
      - mongodb_data:/data/db
      - ./migrations/mongodb/init_indexes.js:/docker-entrypoint-initdb.d/init_indexes.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - zplus-network

  minio:
    image: minio/minio:latest
    container_name: zplus-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - zplus-network

  nats:
    image: nats:latest
    container_name: zplus-nats
    command: "-js -m 8222"
    restart: unless-stopped
    networks:
      - zplus-network

  backend:
    image: ${REGISTRY_HOST:-localhost}:${REGISTRY_PORT:-5000}/zplus-backend:${IMAGE_TAG:-latest}
    container_name: zplus-backend
    ports:
      - "127.0.0.1:8088:8080"
    environment:
      APP_ENV: production
      APP_PORT: "8080"
      PG_HOST: ${PG_HOST:-172.17.0.1}
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-zplus_user}
      PG_PASSWORD: ${PG_PASSWORD}
      PG_DATABASE: ${PG_DATABASE:-zplus_pos}
      PG_SSL_MODE: disable
      MONGO_URI: mongodb://${MONGO_USER:-zplus_user}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DATABASE:-zplus_pos}?authSource=admin
      MONGO_DATABASE: ${MONGO_DATABASE:-zplus_pos}
      REDIS_HOST: ${REDIS_HOST:-172.17.0.1}
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET}
      NATS_URL: nats://nats:4222
      ZPLUS_STORAGE_MINIO_ENDPOINT: minio:9000
      ZPLUS_STORAGE_MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio_admin}
      ZPLUS_STORAGE_MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      ALLOW_ORIGINS: ${ALLOW_ORIGINS:-*}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped
    networks:
      - zplus-network

  frontend:
    image: ${REGISTRY_HOST:-localhost}:${REGISTRY_PORT:-5000}/zplus-frontend:${IMAGE_TAG:-latest}
    container_name: zplus-frontend
    ports:
      - "127.0.0.1:3088:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - zplus-network

volumes:
  registry_data:
  mongodb_data:
  minio_data:

networks:
  zplus-network:
    driver: bridge
