# ==========================================
# Zplus POS - Production Docker Compose
# ==========================================
# Usage:
#   cp .env.production .env
#   docker compose -f docker-compose.prod.yml up -d --build
# ==========================================

services:
  # ==========================================
  # Database Services
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: zplus-postgres
    environment:
      POSTGRES_DB: ${PG_DATABASE:-zplus_pos}
      POSTGRES_USER: ${PG_USER:-zplus_user}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-zplus_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-zplus_user} -d ${PG_DATABASE:-zplus_pos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - zplus-network

  mongodb:
    image: mongo:7
    container_name: zplus-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-zplus_user}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-zplus_secret}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-zplus_pos}
    volumes:
      - mongodb_data:/data/db
      - ./migrations/mongodb/init_indexes.js:/docker-entrypoint-initdb.d/init_indexes.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - zplus-network

  redis:
    image: redis:7-alpine
    container_name: zplus-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-zplus_secret} --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-zplus_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - zplus-network

  # ==========================================
  # Infrastructure Services
  # ==========================================
  minio:
    image: minio/minio:latest
    container_name: zplus-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio_secret}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - zplus-network

  nats:
    image: nats:latest
    container_name: zplus-nats
    command: "-js -m 8222"
    restart: unless-stopped
    networks:
      - zplus-network

  # ==========================================
  # Application Services
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zplus-backend
    environment:
      APP_ENV: production
      APP_PORT: "8080"
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-zplus_user}
      PG_PASSWORD: ${PG_PASSWORD:-zplus_secret}
      PG_DATABASE: ${PG_DATABASE:-zplus_pos}
      PG_SSL_MODE: disable
      MONGO_URI: mongodb://${MONGO_USER:-zplus_user}:${MONGO_PASSWORD:-zplus_secret}@mongodb:27017/${MONGO_DATABASE:-zplus_pos}?authSource=admin
      MONGO_DATABASE: ${MONGO_DATABASE:-zplus_pos}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-zplus_secret}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-your-token-secret-minimum-32-characters!!}
      NATS_URL: nats://nats:4222
      ZPLUS_STORAGE_MINIO_ENDPOINT: minio:9000
      ZPLUS_STORAGE_MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio_admin}
      ZPLUS_STORAGE_MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio_secret}
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_started
    restart: unless-stopped
    networks:
      - zplus-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-/ws}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Zplus POS}
    container_name: zplus-frontend
    environment:
      NODE_ENV: production
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - zplus-network

  # ==========================================
  # Reverse Proxy
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: zplus-nginx
    ports:
      - "${APP_PORT:-80}:80"
      # - "443:443"  # Uncomment for HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./nginx/ssl:/etc/nginx/ssl:ro  # Uncomment for HTTPS
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - zplus-network

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  minio_data:

networks:
  zplus-network:
    driver: bridge
